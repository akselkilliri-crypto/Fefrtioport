name: Build ESP32 Firmware

# Запускать сборку при каждом пуше в ветку main или при ручном запуске (workflow_dispatch)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Install dependencies and compile
        run: |
          pio run

      - name: Upload firmware binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32-racing-wheel-firmware
          path: .pio/build/esp32dev/firmware.bin
          retention-days: 30   # Хранить артефакт 30 дней
